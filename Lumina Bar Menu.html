<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --bg:#0c0c0c;
  --card:#141414;
  --card2:#1a1a1a;
  --border:rgba(201,168,76,0.18);
  --border2:rgba(255,255,255,0.07);
  --text:#e8e0d0;
  --muted:rgba(232,224,208,0.5);
  --premium:#c9a84c;
  --radius:10px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Raleway',sans-serif;
  font-weight:400;
  min-height:100vh;
  padding:0;
  overflow-x:hidden;
  position:relative;
}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:#080808;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity 0.8s cubic-bezier(0.4,0,0.2,1),visibility 0.8s;
}
#loader.hidden{opacity:0;visibility:hidden;pointer-events:none}

/* radial ambient glow behind logo */
.loader-glow{
  position:absolute;width:420px;height:420px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,0.12) 0%,transparent 70%);
  animation:glowPulse 2.4s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{transform:scale(0.9);opacity:0.6}50%{transform:scale(1.15);opacity:1}}

/* rotating ring */
.loader-ring-wrap{position:relative;width:110px;height:110px;margin-bottom:32px}
.loader-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid transparent;
  border-top-color:var(--gold);
  border-right-color:rgba(201,168,76,0.3);
  animation:spin 1.4s linear infinite;
}
.loader-ring-2{
  position:absolute;inset:10px;border-radius:50%;
  border:1px solid transparent;
  border-bottom-color:var(--gold2);
  border-left-color:rgba(232,201,106,0.2);
  animation:spin 2s linear infinite reverse;
}
.loader-ring-3{
  position:absolute;inset:22px;border-radius:50%;
  border:1px solid rgba(201,168,76,0.12);
}
@keyframes spin{to{transform:rotate(360deg)}}

/* diamond in centre of ring */
.loader-diamond{
  position:absolute;top:50%;left:50%;
  width:14px;height:14px;
  background:var(--gold);
  transform:translate(-50%,-50%) rotate(45deg);
  box-shadow:0 0 18px rgba(201,168,76,0.8),0 0 40px rgba(201,168,76,0.3);
  animation:diamondPulse 1.4s ease-in-out infinite;
}
@keyframes diamondPulse{0%,100%{transform:translate(-50%,-50%) rotate(45deg) scale(0.85);box-shadow:0 0 10px rgba(201,168,76,0.5)}50%{transform:translate(-50%,-50%) rotate(45deg) scale(1.1);box-shadow:0 0 26px rgba(201,168,76,1),0 0 50px rgba(201,168,76,0.4)}}

/* logo text */
.loader-name{
  font-family:'Cinzel',serif;
  font-size:clamp(30px,8vw,46px);
  font-weight:400;letter-spacing:0.45em;
  color:var(--gold);
  text-shadow:0 0 40px rgba(201,168,76,0.4);
  animation:letterFade 1s ease both;
  margin-bottom:4px;
}
@keyframes letterFade{from{opacity:0;letter-spacing:0.8em}to{opacity:1;letter-spacing:0.45em}}
.loader-dash{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin:5px 0 3px;
}
.loader-dash span{
  display:block;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:lineGrow 1s 0.3s ease both;width:0;
}
@keyframes lineGrow{to{width:44px}}
.loader-bar-text{
  font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:0.42em;color:var(--gold);opacity:0.8;
}
.loader-sub-text{
  font-size:8.5px;letter-spacing:0.32em;color:var(--muted);
  text-transform:uppercase;margin-top:2px;
  animation:fadeIn 1s 0.6s ease both;opacity:0;
}
@keyframes fadeIn{to{opacity:1}}

/* progress bar */
.loader-progress-wrap{
  margin-top:36px;width:200px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.loader-bar-track{
  width:100%;height:1px;
  background:rgba(255,255,255,0.06);
  border-radius:1px;overflow:hidden;position:relative;
}
.loader-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold2),var(--gold));
  border-radius:1px;
  box-shadow:0 0 8px rgba(201,168,76,0.7);
  transition:width 0.12s ease;
}
.loader-pct{
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:0.2em;color:var(--muted);
}

/* floating gold sparks around the ring */
.loader-spark{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:var(--gold2);
  animation:sparkOrbit var(--od,3s) linear infinite;
  animation-delay:var(--os,0s);
  transform-origin:var(--tx,0px) var(--ty,0px);
  opacity:0.8;
}
@keyframes sparkOrbit{
  0%{transform:rotate(0deg) translateX(56px) rotate(0deg);opacity:0}
  10%{opacity:0.9}
  90%{opacity:0.9}
  100%{transform:rotate(360deg) translateX(56px) rotate(-360deg);opacity:0}
}

/* ── PARTICLES BG ── */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:rgba(201,168,76,0.6);animation:twinkle var(--d,4s) ease-in-out infinite;animation-delay:var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(0.8)}50%{opacity:0.8;transform:scale(1.2)}}

/* ── MAIN WRAPPER ── */
#app{
  position:relative;z-index:1;
  max-width:720px;
  margin:0 auto;
  padding:40px 20px 60px;
}

/* ── LOGO ── */
.logo-block{
  text-align:center;
  margin-bottom:36px;
  animation:fadeDown 0.7s ease both;
}
.logo-name{
  font-family:'Cinzel',serif;
  font-size:clamp(34px,8vw,52px);
  font-weight:400;
  letter-spacing:0.35em;
  color:var(--gold);
  text-shadow:0 0 40px rgba(201,168,76,0.35);
  line-height:1;
}
.logo-dash{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin:6px 0 2px;
}
.logo-dash span{display:block;height:1px;width:40px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.logo-bar{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.4em;color:var(--gold);opacity:0.85}
.logo-sub{font-size:9px;letter-spacing:0.35em;color:var(--muted);text-transform:uppercase;margin-top:2px}

/* ── SEARCH ── */
.search-wrap{
  position:relative;margin-bottom:32px;
  animation:fadeDown 0.7s 0.1s ease both;
}
.search-wrap svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--muted);pointer-events:none;
}
#searchInput{
  width:100%;
  background:var(--card);
  border:1px solid var(--border2);
  color:var(--text);
  font-family:'Raleway',sans-serif;
  font-size:14px;font-weight:400;
  padding:13px 16px 13px 42px;
  border-radius:var(--radius);
  outline:none;
  transition:border-color 0.3s,background 0.3s;
}
#searchInput::placeholder{color:var(--muted)}
#searchInput:focus{border-color:var(--border);background:var(--card2)}

/* ── CATEGORY GRID ── */
#categoryGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  animation:fadeUp 0.6s 0.2s ease both;
}

/* ── CATEGORY CARD ── */
.cat-card{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:18px 16px 16px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:border-color 0.3s,background 0.3s,transform 0.25s;
  display:flex;flex-direction:column;gap:4px;
  -webkit-tap-highlight-color:transparent;
}
.cat-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 0%,rgba(201,168,76,0.06) 0%,transparent 65%);
  opacity:0;transition:opacity 0.3s;
}
.cat-card:hover{border-color:var(--border);background:var(--card2);transform:translateY(-2px)}
.cat-card:hover::before{opacity:1}
.cat-card:active{transform:translateY(0) scale(0.98)}

.cat-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.cat-icon{font-size:22px;line-height:1;flex-shrink:0}
.premium-badge{
  font-size:8px;font-weight:700;letter-spacing:0.15em;
  background:rgba(201,168,76,0.15);
  border:1px solid rgba(201,168,76,0.35);
  color:var(--gold);
  padding:2px 7px;border-radius:3px;text-transform:uppercase;
  white-space:nowrap;
}
.cat-name{
  font-family:'Cinzel',serif;
  font-size:14px;font-weight:500;
  color:var(--text);line-height:1.2;
}
.cat-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:8px}
.cat-footer{display:flex;align-items:center;justify-content:space-between}
.cat-count{font-size:10px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase}
.cat-arrow{
  font-size:12px;color:var(--muted);
  transition:transform 0.3s,color 0.3s;
}
.cat-card:hover .cat-arrow{transform:translateX(4px);color:var(--gold)}

/* ── MENU VIEW (items panel) ── */
#menuView{display:none;animation:fadeUp 0.4s ease both}
#menuView.active{display:block}

.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:none;border:none;
  color:var(--muted);font-family:'Raleway',sans-serif;
  font-size:13px;font-weight:500;letter-spacing:0.08em;
  cursor:pointer;padding:4px 0;margin-bottom:24px;
  transition:color 0.2s;
}
.back-btn:hover{color:var(--gold)}
.back-btn svg{width:16px;height:16px;transition:transform 0.2s}
.back-btn:hover svg{transform:translateX(-3px)}

.menu-header{
  text-align:center;
  margin-bottom:28px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border2);
}
.menu-header-icon{font-size:32px;margin-bottom:8px}
.menu-header-title{
  font-family:'Cinzel',serif;
  font-size:clamp(20px,5vw,28px);
  font-weight:500;letter-spacing:0.15em;
  color:var(--gold);
  text-shadow:0 0 20px rgba(201,168,76,0.25);
}
.menu-header-desc{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:0.05em}

/* ── MENU ITEMS ── */
.menu-items{display:flex;flex-direction:column;gap:1px}

.menu-item{
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  padding:16px 0;
  border-bottom:1px solid var(--border2);
  transition:background 0.2s;
  position:relative;
}
.menu-item:last-child{border-bottom:none}
.item-left{flex:1;min-width:0}
.item-name{
  font-weight:600;font-size:13px;
  color:var(--text);
  letter-spacing:0.04em;
  text-transform:uppercase;
  line-height:1.3;
  margin-bottom:4px;
}
.item-desc{font-size:12px;color:var(--muted);line-height:1.5;font-weight:300}
.item-right{flex-shrink:0;text-align:right}
.item-price{
  font-family:'Cinzel',serif;
  font-size:13px;font-weight:600;
  color:var(--gold);
  white-space:nowrap;
}
.item-price-line{
  display:flex;align-items:center;justify-content:flex-end;gap:6px;
}
.price-sep{
  display:block;width:32px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.5));
  margin-bottom:3px;
}

/* ── SEARCH RESULTS ── */
#searchResults{display:none;animation:fadeUp 0.4s ease both}
#searchResults.active{display:block}
.search-category-label{
  font-family:'Cinzel',serif;
  font-size:11px;letter-spacing:0.2em;color:var(--gold);
  text-transform:uppercase;margin:20px 0 8px;opacity:0.7;
}
.no-results{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}

/* ── ANIMATIONS ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  #app{padding:28px 14px 50px}
  .logo-name{font-size:32px}
  #categoryGrid{grid-template-columns:1fr 1fr;gap:10px}
  .cat-card{padding:14px 12px 12px}
  .cat-name{font-size:13px}
}
@media(max-width:360px){
  #categoryGrid{grid-template-columns:1fr}
}
</style>
</head>

// ══════════════════════════════════════════
// LOADER
// ══════════════════════════════════════════
(function(){
  const loader  = document.getElementById('loader');
  const fill    = document.getElementById('loaderFill');
  const pct     = document.getElementById('loaderPct');
  const app     = document.getElementById('app');

  // Hide app until ready
  app.style.opacity = '0';
  app.style.transform = 'translateY(12px)';

  let progress = 0;
  // Accelerate naturally: fast at start, slow near end, snap to 100 on fonts
  const speeds = [14,12,10,8,6,5,4,3,2,1.5,1];

  const tick = setInterval(() => {
    const idx = Math.min(Math.floor(progress / 10), speeds.length - 1);
    progress = Math.min(progress + speeds[idx] * (0.6 + Math.random() * 0.8), 98);
    fill.style.width = progress + '%';
    pct.textContent  = Math.floor(progress) + '%';
  }, 90);

  function finish() {
    clearInterval(tick);
    fill.style.transition = 'width 0.3s ease';
    fill.style.width = '100%';
    pct.textContent = '100%';
    setTimeout(() => {
      loader.classList.add('hidden');
      // Reveal app
      app.style.transition = 'opacity 0.7s ease, transform 0.7s ease';
      app.style.opacity    = '1';
      app.style.transform  = 'translateY(0)';
    }, 380);
  }

  // Fire on fonts + window load, whichever is later, min 1.6s for drama
  const minTime = new Promise(r => setTimeout(r, 1600));
  const loaded  = new Promise(r => {
    if (document.fonts) {
      document.fonts.ready.then(r);
    } else {
      window.addEventListener('load', r);
    }
  });
  Promise.all([minTime, loaded]).then(finish);
})();

// ══════════════════════════════════════════
// RENDER CATEGORY GRID
// ══════════════════════════════════════════
function renderGrid(data){
  const grid=document.getElementById('categoryGrid');
  grid.innerHTML='';
  data.forEach((cat,i)=>{
    const card=document.createElement('div');
    card.className='cat-card';
    card.style.animationDelay=(i*0.04)+'s';
    card.innerHTML=`
      <div class="cat-top">
        <span class="cat-icon">${cat.icon}</span>
        ${cat.premium?'<span class="premium-badge">PREMIUM</span>':''}
      </div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-desc">${cat.desc}</div>
      <div class="cat-footer">
        <span class="cat-count">${cat.items.length} ITEMS</span>
        <span class="cat-arrow">→</span>
      </div>`;
    card.addEventListener('click',()=>showCategory(cat));
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
// SHOW CATEGORY
// ══════════════════════════════════════════
function showCategory(cat){
  document.getElementById('categoryGrid').style.display='none';
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('searchResults').style.display='none';
  document.querySelector('.search-wrap').style.display='none';
  document.querySelector('.logo-block').style.display='none';

  const view=document.getElementById('menuView');
  view.classList.add('active');

  document.getElementById('menuIcon').textContent=cat.icon;
  document.getElementById('menuTitle').textContent=cat.name;
  document.getElementById('menuDesc').textContent=cat.desc+(cat.note?' · '+cat.note:'');

  const container=document.getElementById('menuItems');
  container.innerHTML='';

  cat.items.forEach(item=>{
    const div=document.createElement('div');
    div.className='menu-item';
    div.innerHTML=`
      <div class="item-left">
        <div class="item-name">${item.name}</div>
        ${item.desc?`<div class="item-desc">${item.desc}</div>`:''}
      </div>
      <div class="item-right">
        <div class="price-sep"></div>
        <div class="item-price">${item.price}</div>
      </div>`;
    container.appendChild(div);
  });

  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════
// BACK BUTTON
// ══════════════════════════════════════════
document.getElementById('backBtn').addEventListener('click',()=>{
  document.getElementById('menuView').classList.remove('active');
  document.getElementById('menuView').style.display='';
  document.getElementById('categoryGrid').style.display='';
  document.querySelector('.search-wrap').style.display='';
  document.querySelector('.logo-block').style.display='';
  document.getElementById('searchInput').value='';
  renderGrid(MENU);
});

// ══════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  const sr=document.getElementById('searchResults');
  const grid=document.getElementById('categoryGrid');

  if(!q){
    sr.classList.remove('active');sr.style.display='none';
    grid.style.display='';
    renderGrid(MENU);
    return;
  }
  grid.style.display='none';
  sr.style.display='block';sr.classList.add('active');
  sr.innerHTML='';

  let found=0;
  MENU.forEach(cat=>{
    const matched=cat.items.filter(it=>
      it.name.toLowerCase().includes(q)||
      (it.desc&&it.desc.toLowerCase().includes(q))
    );
    if(matched.length){
      found+=matched.length;
      const label=document.createElement('div');
      label.className='search-category-label';
      label.textContent=`${cat.icon} ${cat.name}`;
      sr.appendChild(label);
      const list=document.createElement('div');
      list.className='menu-items';
      matched.forEach(item=>{
        const div=document.createElement('div');
        div.className='menu-item';
        div.innerHTML=`
          <div class="item-left">
            <div class="item-name">${item.name}</div>
            ${item.desc?`<div class="item-desc">${item.desc}</div>`:''}
          </div>
          <div class="item-right">
            <div class="price-sep"></div>
            <div class="item-price">${item.price}</div>
          </div>`;
        list.appendChild(div);
      });
      sr.appendChild(list);
    }
  });

  if(!found){
    sr.innerHTML='<div class="no-results">No items found for "'+this.value+'"</div>';
  }
});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderGrid(MENU);
</script>
